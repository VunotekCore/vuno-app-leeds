<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="funnel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48d16b"/>
      <stop offset="100%" stop-color="#2ea84f"/>
    </linearGradient>
    <linearGradient id="funnel2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3bc55e"/>
      <stop offset="100%" stop-color="#249441"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Funnel body - 3 segments -->
  <!-- Top wide section -->
  <path d="M112 140 L400 140 L360 210 L152 210 Z" fill="url(#funnel)" opacity="0.95"/>
  <!-- Middle section -->
  <path d="M152 210 L360 210 L310 290 L202 290 Z" fill="url(#funnel2)" opacity="0.9"/>
  <!-- Bottom narrow section -->
  <path d="M202 290 L310 290 L270 360 L242 360 Z" fill="url(#funnel)" opacity="0.85"/>
  <!-- Arrow at bottom -->
  <path d="M242 360 L270 360 L256 400 Z" fill="#48d16b" opacity="0.8"/>
  <!-- Horizontal stage lines -->
  <line x1="112" y1="140" x2="400" y2="140" stroke="#48d16b" stroke-width="6" stroke-linecap="round"/>
  <line x1="152" y1="210" x2="360" y2="210" stroke="#3bc55e" stroke-width="5" stroke-linecap="round"/>
  <line x1="202" y1="290" x2="310" y2="290" stroke="#2ea84f" stroke-width="4" stroke-linecap="round"/>
  <!-- Small circles at segment intersections -->
  <circle cx="256" cy="140" r="8" fill="#fff" opacity="0.9"/>
  <circle cx="256" cy="210" r="6" fill="#fff" opacity="0.8"/>
  <circle cx="256" cy="290" r="5" fill="#fff" opacity="0.7"/>
  <!-- Subtle glow behind funnel -->
  <ellipse cx="256" cy="260" rx="140" ry="120" fill="#48d16b" opacity="0.06"/>
</svg>
